              "surface-tint":            "#3b6934",
              "inverse-primary":         "#a1d494",
              "secondary":               "#7d562d",
              "on-secondary":            "#ffffff",
              "secondary-container":     "#ffca98",
              "on-secondary-container":  "#7a532a",
              "secondary-fixed":         "#ffdcbd",
              "secondary-fixed-dim":     "#f0bd8b",
              "on-secondary-fixed":      "#2c1600",

              "on-tertiary":             "#ffffff",

              "on-error-container":      "#93000a",

              "on-surface-variant":      "#42493e",
              "surface-container-lowest":"#ffffff",
              "surface-container-low":   "#f3f4ed",

            },

              sans:   ["Plus Jakarta Sans", "sans-serif"],
              epilogue: ["Epilogue", "sans-serif"],
            },
          }
        }
      }};
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { font-family: "Plus Jakarta Sans", sans-serif; }
      h1, h2, h3, .font-epilogue { font-family: "Epilogue", sans-serif; }
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #f3f4ed; }
      ::-webkit-scrollbar-thumb { background: #c2c9bb; border-radius: 4px; }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { scrollbar-width: none; }
      @keyframes fadeIn  { from { opacity: 0 } to { opacity: 1 } }
      @keyframes slideIn { from { transform: translateX(20px); opacity: 0 } to { transform: translateX(0); opacity: 1 } }
      @keyframes slideUp { from { transform: translateY(20px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
      @keyframes scanLine { 0%, 100% { transform: translateY(-50px) } 50% { transform: translateY(50px) } }
    </style>
  </head>
  <body class="bg-background min-h-screen antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
